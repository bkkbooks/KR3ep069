body:
  text: 風溫蔣西城橋病經六日身熱不隨汗解頭猶痛風猶畏口已干苦苔已黃色便溏溺赤更見昏昏不爽胸悶噁心疹點夾斑似出風溫鬱熱欲達而不能暢達也乘此昏變不能不早以慮之葛根解肌湯加前胡木通淡芩又辛涼解散後大汗遍身斑疹齊出頭痛畏風隨之而愈在表之邪從表而出表氣和矣未始不美無如在裡熱邪布於三焦聚於陽明正屬不少肌膚蒸熱舌苔於黃胸前痞悶便泄溺黃脈形弦數尚恐反復黃連解毒湯加淡豉花粉蘆根連翹牛蒡茅根又熱邪深入營中雖解其毒未殺其勢須防液涸而昏犀角一錢鮮生地一兩丹皮三錢川連七分赤芍一錢五分淡芩一錢五分黑梔一錢五分川柏五分連翹一錢五分竹葉三錢蘆根一兩文塘市頭痛太陽傷風之症半月有餘不能使其尋路而出其邪郁矣鬱則不但病於本經往往傳入陽明之界變為身熱無汗畏風苔白是已傳入陽明未離太陽之候竊恐再傳選奇湯加葛根枳殼桔梗陳皮牛關上病經六日述已經大汗而身熱不退頭痛節痠舌苔尚白口已干苦痞悶按痛耳聾溺赤脈緊而數此係溫邪夾濕招風以起夾食難消其勢正在張皇每多傳變慎之葛根黑梔豆卷橘紅薄荷蔥白淡豉生草川朴枳實滑石又進前劑熱退身涼邪已解矣然散而留者舌上白苔變作嫩黃之色口鼻乾燥神倦妨食溺黃脈數清化為宜溫膽湯加花粉穀芽許渡僧橋病經七日頭體皆痛蒸熱少汗不食噁心胸悶煩逆口中乾苦白苔滿布溫邪內伏從此昏昏不爽而變不能不早以慮之達原飲加葛根羌活柴胡又達原之後病從戰汗而解此方之靈於郡中者鮮矣然白㾦轉黃黃者里有伏邪未盡所以脈靜身涼口乾咽痛容易發作不能不慮栝貝養營法主之栝貝養營湯去蘇子加甘草又栝貝養營湯後自云無病矣然脈雖虛口尚乾燥津液未潤之候養營一法在所必需瓜蔞皮白芍知母花粉川斛麥仁甘草又募原餘邪復瘀到胃舌苔薄白漾漾噁心膚熱形寒頭脹節疼乘其勢而開泄之蔥豉湯加枳實梔子厚朴二陳去甘草加蔞仁又膚熱不能得汗而退舌苔白膩口中乾苦腰痛頭痛募原伏邪又屬張皇之候防變小柴胡湯去參加草果赤苓陳皮爪蔞仁枳實桔梗又病情如昨舌上之白苔化作嫩黃脈來不浮不沉而數身熱少汗口仍干苦煩熱不寐提化為主如不戰汗必變端柴胡黃芩花粉赤芍知母陳皮川連黑山梔赤苓甘草葛根竹茹又昨日病情又從戰汗而解舌上之苔仍未化清口乾溺短神倦清理餘邪為要花粉歸身白芍陳皮甘草穀芽茯苓川斛又白苔已化眼易花頭易脹口易干餘火未清清之為要川斛花粉陳皮甘草茯苓丹皮白芍麥仁穀芽另水泛六味丸資生丸溫毒謝琢診北碼頭咳傷血絡繼以寒熱自汗月餘不解昨日齒衄火出膚布紫斑口中乾苦小溲短赤胸痞胃本有熱又受溫毒兩陽相搏血自沸騰非清不可防昏黃連解毒湯合犀角地黃湯加玳瑁三錢青黛五分又師轉已進解毒法青紫之斑更多於昨紫黑之血仍盛於今身之熱口之臭便之黑種種見症毫無向愈之期溫毒之伏於中者正不知其多少然元氣旺者未始不可徐圖而今脈息雖數按之少神深恐不克支持猝然昏喘而敗犀角地黃湯加制軍一錢五分歸身炭一錢五分玳瑁三錢人中黃一錢五分岕茶五分又琢轉青紫之斑布出更多紫黑之血尚湧於齒口舌糜爛口氣穢臭溫毒之極重極多不可言喻大清大化本非難事無如脈之無神者更見數促神氣更疲面青唇淡一派無陰則陽無以化之惡候古云青斑為胃爛此等證是也勉擬方鱉甲歸身甘草雄黃天冬生地洋參元參青黛師加碧雪五分調入暑溫姚常熟惡寒無汗之下身熱不除甫經三日神氣漸昏不知人事面垢遺尿譫語時甚致肢動頭搖氣急痰聲口乾苔剝脈弦滑數左右無神暑先入心亦必傷氣都被冷風外遏襲入手足厥陰有進無退驟變之形已露奈何奈何勉擬方以盡醫力薄荷七分滑石三錢生草四分羚羊角一錢五分當歸一錢五分赤芍一錢五分細生地四錢川芎五分防風二錢茯神三錢遠志一錢五分竹瀝一兩石菖蒲汁一錢杏仁三錢川貝三錢另藿香正氣四錢入煎安宮牛黃丸八分又頭之搖肢之動言之亂神之昏患在手足厥陰者皆有和意且面垢時笑循衣摸床等象亦能遞減似屬佳兆然十分病僅衰一二而身有微熱微汗胸次不舒得湯如噎舌苔灰膩口中乾燥自云心內乾熱大便旁流矢氣下轉脈弦滑數暑風濕熱痰食交阻之邪布於三焦者正屬不少必須涼膈清心以分其勢再論吉否桔梗一錢五分連翹一錢五分制軍二錢生草五分薄荷五分黑梔一錢五分歸身一錢五分羚羊角七分遠志一錢去心茯神三錢竹瀝一兩入薑汁二匙沖白蜜五茶匙同煎石菖蒲一錢五分又汗收加熱舌尖光紅脈來弦數尺部軟弱痙象略重此暑伏營中暗傷津液似瘧而作也尚恐熱極變端必須天明以前微汗而解為正犀角四分丹皮一錢五分川貝三錢茅根一兩鮮石斛一兩鮮生地一兩花粉一錢五分桑皮錢半又左脈稍和右仍數滑風之動者雖輕大半而心包部分尚屬若明若昧身熱微汗黃昏則劇小溲頻數肢體易痙舌苔灰濁胸脘不舒顯系手足厥陰之邪欲歸陽明中土土中之暑邪濕熱結祕不開氣皆受病也病在險途未便小安為慰川連七分酒炒淡芩一錢五分川黃柏七分茯神三錢枳實五分桑葉二錢丹皮一錢五分木通四分黑梔二錢全瓜蔞六錢川貝三錢竹葉一錢荸薺四枚海蜇一兩萬氏牛黃清心丸四分西瓜汁又今日神氣又清於昨呼吸之氣亦和於前似屬佳兆然身熱似瘧小便頻數等症不一而足且舌尖深紅邪雖漸化陰液大傷非所宜也川連五分黑梔一錢五分中生地五錢麥冬一錢五分車前三錢桑葉一錢五分竹葉三錢淡芩一錢五分丹皮一錢五分瓜蔞三錢元精石二錢茯神三錢牛黃丸四分茅根湯下又小便頻數等症霍然而愈毋庸論矣就脈數左小右大舌尖稍紅口中乾燥夜頻少寐神亦少慧陰虛邪戀之時又值立秋大節小心反復清化餘邪之法參人養陰之中中生地棗仁茯神知母丹皮杭菊石決明花粉淡芩青蒿元參珍珠粉又神明已出肢體更疲言語亦覺無力脈平而帶小數小寐妨食舌色尖紅口時乾燥病漸退正益虛仿七虛三實例擬甘寒除熱法仍不出暑邪調治之範圍參葉五分甘草三分麥冬一錢五分元生地五錢川斛三錢石決明七錢花粉二錢茯神三錢羚羊角一錢五分穀芽三錢茅根一兩燈芯十根張長興失血之體宜補前病之後元虛不復亦宜補正在虛則補之之候小有寒熱虛更甚矣尤宜大補然脈形細小而按其至數則數察其形象則滯加以寒熱分爭爭於午後胸前痞悶舌苔滿白口中乾膩小溲色黃大便或溏咳嗽時作頭痛體痠一派暑邪內伏出入於少陽陽明之界又須提化時也斟酌為宜小柴胡湯合溫膽湯加旋覆花杏仁怪病朱太湖上怪病礞石滾痰丸一錢五分又痰從滾法滾之則隨氣升降據述輕矣然其所以不能速愈之故或因氣鬱不宣痰雖欲滾而不能全滾也未可知半夏厚朴湯煎服送礞石滾痰丸一錢風熱中州宦者席公來書懸擬方風勝則浮熱勝則腫浮腫二字俱全斷為風熱非杜撰也浮腫之勢起於兩頤延及咽喉又及牙肉頸項顏色轉紅飲食不便有如噎膈之形病情之有加無已風熱之無路以出不言而喻惟其如此病無中道而立之理勢必益造其偏風熱之邪陽邪也陽邪從陽而親上所以肺熱葉焦則生痿躄手足不能舉動然猶未也大筋軟短小筋弛張軟短為拘弛張為痿且至頸背強𠘧𠘧然矣其俯仰之常病之形於外者可云苦矣而不知邪已更形於內俾得喉主天氣咽主地氣出納之所勃然加腫妨礙飲食幾乎閉而不通欲作喉痹也喉痹之症急痿躄之病緩緩者已得清滋而漸緩急者亦須清化而不急蓋喉痹痿躄無一而非風熱亦無一而非風熱伏於肺胃兩家纍及於三陽經絡也然乎否乎姑擬許氏方主之以備採擇杵頭粳三錢包薄荷二分後入桑皮一錢羌活五分羚羊角七分牛蒡子三錢炒研淡豆豉三錢大生地三錢綿黃耆一錢白蒺藜三錢去刺肺癰楊上塘咳嗽臭痰口中辟辟燥胸前隱隱痛已經半載有餘脈形雖然變小而數疾有力肺癰之根底不清不宜再延延則聲音漸爍反成肺痿不可救藥也近來氣息短促肺金不能當令而旺更恐其喘蘆根苡仁杏仁冬瓜子地骨皮青黛蛤殼桑皮川貝去心紫雲瘋孫常熟紫雲風后上病於牙關下病於腿骱能潰而不能斂元氣因虛餘毒又走下腿骱中強痛不和脈弱色痿神倦妨食自汗嗌乾心悸虛證百出必須大補鹿角膠黃耆黨參歸身熟地肉桂生於術白芍炙草陳皮茯神河車炙一錢五分喉痹握別以來瞬更裘箑每懷雅度時切神馳比維道履安和順時晉吉以頌慰弟寄迹棲山將屆一載公私歷碌無善可陳大小女人夏以來喉間常時作痛近更生有白點飲食難進是否應歸內治抑系外用敷藥此間又無名醫診觀殊難測其是何症候伏乞酌擬方藥交存敝室轉寄素承關愛定不以瑣事見卻也專此布懸即請時安合吉不盡李鴻鈞所言大令愛入夏以來喉間時常作痛近更生有白粒飲食亦多不便云云似屬喉痹喉痹之證自古已然於今為甚數年前狂風毒風日夜交作霍亂之餘變為此症浙江安徽三省處處患之皆不外陰虛多火之人一有新風鬱熱便起咽喉梗痛色兼紅白有如花駁之形或咳嗽音爍或腹脹妨食胸前之悶或重或輕始而尚如實證後來變作陰虛歸入癆病一途最為扼腕今大令愛尚在初起之時不繫乎新風即關乎鬱熱宜散宜清懸而擬之附方於後以備採擇桔梗連翹元參生草薄荷川貝淡芩牛蒡馬勃另碧雪丹舌候上海舌乃心之苗其所用事者包絡所主相火升之於舌舌自作疼痛經百日之久津液暗傷舌色光絳而不生苔甚至相火自戕根本兩目昏眩右關脈息弦數左寸關部更甚恐其不愈將口糜接踵而至生地天冬生甘草黑梔元參西洋參淡竹葉柏子仁遠志肉羚羊角木通川連赤苓丹參當歸又舌痛已除苔還不生水虧火旺宜養宜清近日冒風咳嗽音爍權以化法瀉白加杏仁前胡荊芥通草甘草桔梗接服方三才參用洋參導赤元參丹參柏子仁川連阿膠茯神藕另天王補心丹硃砂安神丸咳嗽吐血倪府前街兩脅不舒勞則失血又兼上升之氣無端而出之於口或作咳而乘之於肺甚則氣行血亦行氣止血亦止其為氣也至大至剛似屬古語云上升之氣自肝而出中挾相火然則兩脅屬肝初病在肝而今亦未出乎肝肝者將軍之官其性本剛剛則柔克非柔不和一語本為治肝而設不能不宗之以防其陡然上冒大熟地五錢磁石三錢青鉛一兩打羚羊角一錢五分苡仁一兩側柏葉三錢川貝一錢五分去心秋石三分藕節炭三錢又血之冒勢已平而咳痰之中尚兼血色氣未降血易升勢所必致未便以小安為慰天冬熟地旱蓮草青鉛龜版秋石川貝沙參側柏炭苡仁磁石藕節炭陳嘉興上失血下漏瘍而患咳嗽未有不從陰虛而得六味加沙參麥冬川斛川貝陳皮徐三鄉廟脾為生痰之源肺為貯痰之器咳嗽久而未輕晨起更重所吐之痰稠稀不一舌苔薄白脈息小弦欲清貯痰之器庶必先絶生痰之源然乎否乎六君加麥冬蘇子吳嘉興臥不能正偃正偃則咳甚而息有音肺胃二經皆作貯痰之器然非一朝一夕如此恐難取效蘇子降氣嚴按此肺咳也內經肺咳之狀咳而喘息有音又痰飲久踞外易招邪風內易動陰火一招一動咳嗽必劇然邪風外感必有外感見證據述所見之症毫無外感情形反有陰火內動之象蓋所見咳嗽日間本輕夜亦不為遽重每至寅時而劇夫寅時氣血注肺之時肺經貯痰其氣已塞此時氣血一注其氣更塞塞則咳多嗽少加之以嘔逆噁心涕唾隨之重之於火升面紅噴嚏而呼吸短促呀呷有聲豈非火逆上氣咽喉不利肺咳之狀咳而喘息有音都被痰飲所動乎如是者有年其中寒熱溫涼補瀉通塞竟無見長之藥而欲一舉兩得收功於朝夕者斷無是理蘇子降氣合麥門冬湯加竹瀝風化硝白芍紫菀周濮院脈數而澀陽絡頻傷之後咳嗆少痰胸膈痞悶喉癢乾渴少納便結酷暑內郁化火傷陰肺失清肅也不宜久延延則成損損之所致有外邪也與本來勞怯者有間燥令大行而遇此症當以西昌法清燥救肺湯去麻仁加羚羊角川貝又進西昌法咳嗆稍輕納食少加藥之的對病情也可知然咽嗌常乾等症尚未向衰燥與火邪正甚加味用之為要前方加花粉鮮生地丁福山肝火上衝於胃胃家所積之血從此而出頻發頻止每易歸入損門慎之二至加白芍炙草忍冬藤龍膽草苡仁枇杷葉茅根另金銀花藤干剪草三味熬膏馬無錫咳嗽久而已緩尚易吐血右關脈數且急陽明伏熱使然犀角地黃湯枇杷露陳虎丘小有寒熱之餘咳嗽氣喘痰血少納盜汗神疲想是勞倦體質無力化邪恐其喘甚汗多清燥救肺湯去麻仁加炙草阿膠川貝玉竹茅根吳橫涇培養脾肺兼化火邪夜來得寐而其所患咳嗽減矣然減不足言尚形咳逆吐出咸痰喉癢口乾胸悶脈數將瀉白散加味用之瀉白加二母桔梗淡芩枇杷露朱海寧咳嗽脈數左關浮大風邪深入肝經化火傷肺也咽痛音爍嗌乾恐其成損補肺阿膠加瀉白二母蛤黛羚羊角徐楓涇去秋失血其咳尚輕惟冬間一咳已交初夏加劇音爍於上便溏於下能食無力或咽痛或嗌乾想勞倦傷脾不能制濕於中焉得生金於上防損訶子肉通草桔梗甘草茯苓地骨皮桑皮苡仁川貝麥冬奚湖州咳嗽失血一月有餘不斷究恐喘冒勿以緩而急之四生去艾加瀉白二母枇杷露茅根忍冬藤旱蓮草周顧山陽絡頻傷血皆紅色此時吐者遽述粉紅粉紅之血營衛虛也虛則不能攝血血脫之於外勢所必然歸脾用丹參苡仁枇杷露又血有所歸今日止矣然石脈芤大尚屬氣分大虛不能攝血之象血脫益氣之法正為此等證而設當取之歸脾湯吳橫涇陽絡頻傷咳嗽咽痛脈形細數神倦少納積損成癆陰火已沖之象六味合生脈加百合張樂榮坊巷咳嗽一爽經絡之精夜潤矣潤則所留之瘀血從此而出胸前悶痛從此而輕豈非美事但漏瘍日久陰氣下泄陰火上升肺金仍受其刑脈形細數口舌乾燥一損損於下自下而損及於上之形未有艾也欲卜其旋元吉未許穩成六味合四陰加黃明膠二母枇杷露陸嘉興咳嗽未止胸悶先開膹郁之屬於肺者已有清肅之機然雖得其機尚不能作貯痰之器亦不能竟為生水之源此咳嗽嗌乾所以不能即愈也清燥之品已有餘救肺之味還不足清燥救肺加大生地花粉川貝裘海門形寒傷肺傳入大腸咳嗽於上外瘍於下久而不愈咽爍嗌乾脈形弦緊帶數所謂一損損於肺此症是也芎枳四物紫蘇紫菀杏仁又得汗則咳嗽自松然所達之邪不足以盡其病前方加減可也前方加麥冬甘草郁長安時病中之咳嗽失血經年未愈加之以寒熱重之以盜汗脈弦而數肌肉暗削積虛成損恐至積損成勞當歸六黃合四陰去草芩加川貝生蛤殼彭通州咳嗽已經四載未痊然亦無大害惟深秋病劇之餘常難脫體輕則生痰重則動血胸或痛口多幹脈形澀數是肺病也不宜再延延久恐成一損清燥救肺去石膏麻仁加絲瓜絡川貝花粉此元氣已虛又經炎熱之蒸灼復傷其氣所以至秋而發咳也金嘉興脈數右部中按弦大左部沉按細急細急者陰傷也弦大者伏邪也陰傷則熱伏邪亦然左右之至數自然見數據述去春咯出純血或帶紫紅之液喉間從此黏痰面部從此火升口乾津不到咽亦從此而間作肺胃兩經毫不介意孰知二經一病內熱薰蒸於上毛竅常開於外或風或溫容易乘虛而入陽絡重疊受傷秋間猶可冬令加劇然則伏邪之化熱傷陰見證而非陰虛不足自內以生之弱症也陰既傷矣不能不養邪熱之伏留陽明不能化盡究屬此病之根不能不以清熱為主忍冬藤麥冬川貝知母阿膠地骨皮石斛花粉枇杷露仲上津橋寅時氣血注肺肺受氣血之注相傳更屬有權清肅行矣而反咳嗽喉癢嗌乾氣逆溺微黃胸微悶何氣使然曰風溫失血得清涼而止而風溫之邪尚戀肺經一被氣血所注壅塞不通此咳嗽等症獨甚於斯故也白為肺色瀉白即所以瀉肺瀉肺者瀉肺經所戀之風溫也加味瀉白散去參加川貝花粉銀花露陳崇明咳傷血絡絡傷之後咳久不除咳之所以不除都為絡傷也顯然然積虛成損積損成勞無怪乎脈形細數內熱蒸蒸神昏言微不耐炎蒸已露一斑矣速速退歸林下扶過三伏再商玉竹飲子加麥冬丹皮青鉛阿膠沈王江涇咳嗽半載寒熱經月苔白口膩幹不多飲痰不暢出小溲色黃脈形弦細此係陰虛受風久而不化又患以暑病情加劇也傷風成勞傷暑成瘵勞瘵之根最難下手而況陽絡新傷更難取效清燥湯去蒼朮加杏仁旋覆花紫菀枇杷露諸無錫脈數右部澀小左太浮弦咳嗽兩月有餘不獨上傷陽絡且兼結腫肛門便難口燥顯系陰虧之體不耐燥氣加臨肺氣自戕傳及於腸極易成損速以食色之性慎之清燥救肺加大生地羚羊角花粉川貝陳木瀆陽絡重傷咳無虛日且咳嗆連聲痰始一應往往盛於五更肝火刑金水虧所致近來大便易溏亦在五更之候脾陽下陷不問可知陽陷者必須溫而升之水虧者又須清而降之病在用藥兩難之際必須斟酌六味合參苓白朮散百花膏又溫升與清降並行上下之見症無一不和各得其所也大妙所嫌左關一部之脈弦雖當令過大過急肝陽內旺腎水暗虛養肝之法合入前方照前方去桔梗加牡蠣哮喘何通州肺為貯痰之器痰中有火毛竅常開風邪易感哮喘時作作則降氣為先蓋以肺雖貯痰而其所主者氣也氣降則痰降氣升則痰升蘇子降氣湯杏仁另指迷茯苓丸礞石滾痰丸錢蕩口咳嗽哮喘正在竊發之際脘腹脹滿皮膚浮腫四肢逆冷脈息細小舌苔白膩元陽不足肺本虛寒外不耐風邪內不耐濁氣交相為患也恐其塞厥而敗蘇子降氣去夏草防己茯苓冬朮川附杏仁金猛將衙咳嗽而兼呀呷有聲哮喘病也當發之時宜治其上蘇子橘紅半夏歸身人參乳香白果杏仁王吳江哮喘本宜辛降而大便久溏雖利乎辛不利乎降二陳桂枝桑皮淡芩杏仁白果蔡常熟哮為上喘喘出於肺也肺本清肅何以作喘而不知肺為貯痰之器容易招風亦易阻氣氣機不利則呀呷有聲矣指迷茯苓丸孫楓涇脾為生痰之源肺為貯痰之器夫脾屬土健運者也肺為金堅剛者也何以有生痰貯痰之患而不知兩經虛者各失其體所進飲食不能運化氣血陡變為痰一有風邪外束呀呷有聲上喘自作以昭肺病不獨平日之脾虛痞脹而已然此時哮病不作從痞立方為要茯苓丸冬朮杏仁橘紅雞內金程臬橋形寒飲冷則傷肺所貯之痰因此而動動則呀呷有聲臥難著枕哮喘作焉愈發愈勤甚至生痰之源源源而來已昭腎氣下虛不獨肺病而已現在右脈滑大標病為急宜先治之三子養親合蘇子降氣去歸桂瀉白冬瓜子杏仁金嘉興痰飲內留最為咳嗽之蒂老痰內伏又為哮喘之根哮喘多年時發時愈今歲更勤即咳嗽之症亦無全愈之日痰飲老痰一在於肺一在於脾脾肺兩經比之往時則弱弱則痰飲老痰之竅踞者毫無向化之期培養脾肺最為此症要藥然獨治其本而未及其標現在屬標病者痰飲也咳嗽見於老痰哮喘之餘正須著眼治之以使苟安未識是否茯苓丸加旋覆花桑皮紫菀茸杏仁白果發哮時服蘇子降氣湯鍾湖州肺為嬌臟不耐邪侵一傷於悲哀二傷於發散從此相傳無權清肅失司木寡於畏怒則為哮毛竅常開寒則亦發當發之時肺經所貯之痰脾經所生之痰無不攸歸於竅呀呷有聲臥難著枕如是者數數矣現在不發之時脈靜而細弦元陽不足非補不可非溫亦不可紫菀茸銀杏肉玉屏風合貞元兩儀金水六君加五味桑皮韓南壕肺為嬌臟不耐邪侵若有熱伏於中者則毛竅常開風邪易感感則哮喘發焉然上病外邪固能如是而不知腎氣虛者脾氣衰者一經勞動亦易喘急是以喘勢有加無已標本同病也六味瀉白麥冬蘇子牛膝竹瀝胡奉賢似哮非哮而實肝腎下虛氣已早不歸元苟有所傷則下氣上逆吸不歸根而喘矣速為靜養以免虛脫金水六君生脈牛膝牡蠣胡桃肉杏仁金匱腎氣丸金水六君丸二味和勻清晨青鉛一兩煎湯送下朱吳江愈發愈勤之哮肺經病也腎氣虛矣然究其兩經所病未有不因乎脾衰衰則所進飲食生痰生飲內可以動腎氣外可以招肺風欲斷此哮必須崇土況現在咳嗽獨甚寅時前後食積生痰更宜崇土者乎六君神麯炒楂麥芽楊安徽哮喘時發發則胸悶咳逆臥難著枕病之常也惟所出之痰或帶紅色口中之味亦作氣穢肩背痠痛脈形小數肺胃兩經必有伏熱在裡蒸開毛竅容易招風最為纍事現在哮止二日吐出之痰黏而且黃尚從咳出不能不以清法桑皮骨皮杏仁冬瓜子絲瓜絡白果川貝蘇子蘆根浮石苡仁如哮喘發作時加萊蔔子白芥子紫菀桔梗朱吳江復診至哉坤元萬物資生所進飲食生氣生血不致生痰生飲咳嗽自除所謂治病必求其本誠哉是言也六君九味資生丸又丸方金水六君合參苓白朮加神麯麥芽山楂楊關上肺俞伏痰招風則發哮喘呀呷有聲臥難著枕甚至寒熱分爭近來平善之事呼吸短氣痰聲不利脈象弦滑肺胃兩經都被痰所貯也權以導滌法指迷茯苓丸蘇子橘紅杏仁炙草旋覆花音爍卜肺氣本虛之體不耐風邪外感音爍不揚訶子散又丙轉金實無聲金破亦無聲金聲不外揚兩手脈小責其肺氣久虛元府不閉風邪得而襲之是虛為本實為標矣訶子散玉屏風紫菀石菖蒲曹震澤土能生金金聲不能嘹亮者土氣必虛虛則補之蓋補土即所以生金異功訶子通草桔梗徐楓涇去秋失血其咳尚輕惟冬間一咳已交初夏皆劇音爍於上便溏於下能食無力或嗌乾或咽痛想是勞倦傷脾不能制濕於中焉能生金於上防喘訶子肉通草桔梗甘草茯苓骨皮桑皮苡仁川貝麥冬張平望語聲喑喑然不徹者心膈間病心膈之間肺也肺病則次指無力脈小而滑滑則為痰小則為虛肺既虛矣自易貯痰桑葉枇杷葉杏仁炙草川貝降香竹瀝訶子肉胸痹單海門胸痹者胸中陽氣不通也久則難變必須日就月將庶轉旋吉否防吐血瓜蔞薤白半夏旋覆花絲瓜絡冬瓜子橘絡延胡金鈴子榮青浦心痛徹背是名胸痹久而不化適值燥氣加臨咳嗽未了咽喉乾燥痰內帶紅脈形細小理之不易瓜蔞薤白橘紅枳殼杏仁桑葉枇杷露張齊門胸痛徹背嘔吐厥逆脈左弦甚想是中陽不曠而肝風載痰上逆也瓜蔞薤白半夏湯金鈴子散蘇子杏仁旋覆花任無錫胸痛徹背延及於旁又兼咳嗽此陽氣不曠風痰交阻於中久防動血栝蔞薤白半夏湯加白酒旋覆花杏仁枳殼橘紅茯苓萬嘉興胸痹初愈脈形弦滑舌苔糙濁脾胃陽虛濕痰內阻生冬朮枳實拌炒半夏瓜蔞薤白茯苓炙草益智仁旋覆花生薑橘紅穀芽金接駕橋背痛徹之於胸胸痛亦徹之於背其中之陽氣安在哉然脈虛而弦白苔滿布小溲短赤氣逆為噫更有濕濁在裡鬱而不化也治中合連理越鞠徐湖州胸脘作痛延及背脅舌苔滿布脈象細弦陽虛不曠濕邪寒氣凝結於中無從化解也從胸痹例治法栝蔞薤白半夏湯推氣吳仙六安談侍其巷動則氣逆從胸膺之間逆入兩肩部分作脹作痠舌苔滿白脈息小弦此係胸陽不曠濕痰阻氣也旋覆花湯合瓜蔞薤白半夏湯桂枝橘紅又胸為陽位非溫不可所以溫通之下氣之逆者已和其半半之留落者尚須加減用之栝蔞薤白半夏湯二陳茯苓丸蘇子旋覆花痧勞顧平望痧子後久咳不痊所出之痰或緑或白肌膚灼熱口舌乾燥乍不得眠眠則鼻塞氣悶所患風熱之邪留於營分肺胃日病陰液暗傷即名痧勞也亦宜四物用生地羚羊角絲瓜絡香蘇飲葦莖湯又進前方病衰其半肺胃兩經尚有留落者不能不以辛涼解散四物香蘇飲葦莖湯絲瓜絡羚羊角淡芩又脈形小數小為病退數為餘邪咳嗽雖輕尚未了了補陰之中寓以消法四物瀉白二母蛤黛散淡芩蘆根枇杷露另瓊玉膏脾胃勞倦黃海寧物物有陰陽就脾臟言之亦有陰陽在焉脾陰為心力所傷舌苔剝落口中乾燥容易生熱勢所必然若脾之陽氣都被勞倦所傷則健運失常胃家所受水穀未免作脹亦易事也陰無驟長之理陽有生陰之義先理脾陽最為現在要著異功合香砂加白芍穀芽山楂周嘉興飢飽失時脘中作痛見於背膂時疼之體勞倦傷脾也近來咳嗽痰白未免新風外感兼理乃妥六君合治中加金沸草前胡杏仁紫蘇桑皮歸身馬海鹽納食主胃運化主脾能納而不能運脾弱胃強可知然脾屬土土之生於火也火土不合其德必須補火以生其土大便乾結少腹有形剛溫本非所宜主以柔溫乃妥大熟地歸身炭枸杞子懷藥蓯蓉沉香菟絲餅柏子仁廣陳皮冬朮黨參九香蟲自盜汗胡松江頭痛之餘夜來盜汗所謂陽加於陰此症是也桑葉甘麥大棗生地石決明茯苓白芍李鼻衄作痠變為自汗盜汗神倦神昏當歸六黃湯玉屏風沈楓橋失血久咳盜汗氣急陰不斂陽陽被邪火所蒸而越所以外反惡寒當歸六黃加粉黛散加枇杷露周常熟産後盜汗口甜或發寒熱蒼黑肥盛之人是屬陰虛之體患此乃陰虛濕熱也大補其陰大清濕熱當歸六黃湯周下橫盜汗陰虛者多自汗陽虛者少二者兼而有之當取並行不悖之方為治當歸六黃防風周無錫溫熱之邪從陽而加入於陰自汗盜汗皆如雨下交冬則然余時惟動則有之近來心中嘈痛汗出太多津液內虧之象補中寓化為宜甘麥大棗玉屏風當歸六黃省頭草不寐俞西匯衛氣行於陽則寤行於陰則寐寐少寤多衛之氣行偏於陽分不入於陰陰虛不能戀陽陽不下潛舍補陰之法別無他法黑歸脾龜版半夏秫米另磁朱丸孫東塘不寐陽蹺脈滿使然秫米半夏天王補心丹去遠志桔梗五味加竹瀝另硃砂安神丸三錢臨臥服宋閶門夜間少寐口燥而苔膩晨起略作乾嘔膽府失其清淨胃亦不和溫膽半夏秫米湯棗仁知母施胃不和則臥不安然胃本和也必有所以不和之故左寸脈沉心氣下郁右關脈弦濕氣內阻一阻一郁無不歸之於胃胃雖欲和而不得和也理所必然交感朱雀半夏秫米棗仁用連拌炒橘紅夜交藤陸吳江多病者必須藥物前病既多服藥不少姑置勿論就夜來不寐言之是陽蹺脈滿也然滿則固然不寐而夜間仍有寐時即得寐時容易驚惕而醒又屬肝經伏熱不能藏魂所致且先藏之真珠母丸真珠母熟地當歸人參棗仁柏子仁茯神犀角龍齒沉香又肝已藏魂夜能自寐然肝之火相火也心之火君火也君火一動相火無不隨之而動養化肝經固佳清補心經更妙真珠母丸銀花硃砂安神丸米飲湯送下脹滿痞祁崑山便血日久不痊腹形漸滿是血虛不能斂氣也當時大補其血以斂其氣病情無有不和既失此著血反凝而內阻大腹更滿甚至臍突筋露妨食氣短變為棘手之候奈何四物合附子理中加牛膝車前桃仁琥珀屑陸孝義坊巷暴腹脹大陰故暴陽即不暴然則此間之脹大屬於暴者屬於陰而不屬於陽也顯然足部時疼現在竊發之餘厥陰肝邪不病於本經而順乘中土良有以也殊屬棘手茅朮理中加木瓜香附赤芍檳榔川朴丁烏鎮血痢日久尚患溏泄大腹脹滿按之如鼓右脈弦滑而數飲食遞減神情困倦臍已平者防突厚朴生薑半夏人參湯煎送小溫中丸一錢五分中滿分消丸一錢五分又溏泄稍和滿痛時作脈形弦滑左亦太硬三蟲共食一器且被肝木所乘照前方加金鈴子散青皮炒楂煎送前丸又肝脈一和腹痛自止未始不佳無如右脈弦滑腹形硬滿臍突溺短大便還溏所患之邪正屬不少仍照前方去金鈴子散炒楂加大腹皮澤瀉赤苓包海鹽酒之濕熱已積二十多年曾經衄血又患黃疸現在單單腹脹二便違和口中乾苦脈形弦數理之棘手臍雖外突食尚加餐下奪之法可以施行小溫中丸八兩每服三錢黨參一錢五分白朮一錢陳皮一錢葛花一錢五分雞距子一錢煎湯送下又土鬱奪之則單腹脹應手而平然小便已長尚兼黃色左脈多弦鼻衄易流肝經之濕熱未清尚易傳入中土而作反復也照前方加茅花一錢緑豆一兩石橫涇血中有氣血脫氣亦從而脫脫則所主濕邪不能運化大腹脹滿日久不痊臍突筋露脈小色萎如其一加喘息不能下問矣附子理中肉桂茯苓橘紅半夏當歸浮腫吳夾鋪橋面腫曰風腫退而變為一身脹滿咳嗽氣塞脈小左浮右沉溲短肢冷所感之邪風自肺而傳入脾也恐為喘塞而敗小青龍湯合麻杏石甘湯王吳江病後移邪於肺咳嗽不已繼以浮腫或見小有寒熱溺黃氣升防喘就病中無汗臥難著枕而論當以小青龍法小青龍合石膏湯汪崇明一身盡痛變為浮腫是風濕為病也病已向愈元氣未充所有餘邪容易招暑季夏腹中作脹脹極而滿甚至上下均見浮腫脈形弦細舌苔滿白小水不長以昭陽氣內虧法當溫化以冀不喘春澤合防己黃耆陳吳江男子以自下腫上為逆究其所以致此之故濕邪無路可出氣又自外而來互相交結故苔白口乾脈弦不能食也幸未氣喘防己茯苓陳皮冬朮澤瀉牡蠣紫蘇桑皮李葑門因於氣為腫腫之見症未有不屬於氣也明矣然氣有虛實右脈軟弱左關帶弦脾經不足濕氣有餘或因肝氣內逆風邪外觸皆可作也茯苓防己黃耆桂枝冬朮陳皮乾薑桑皮炙草盧男子自下腫上為逆已逆而舌苔不生逆中之逆也能不慮其喘乎防己石膏冬朮茯苓炙草五加皮黨參黃耆另濟生腎氣丸禹餘糧丸陸北壕因於氣為腫然面腫曰風足脛腫曰水想是氣虛之體風水外襲而共成此腫也防己黃耆湯茯苓桂枝陳皮制川附桑皮周松江咳喘於前浮腫於後病經一載脈息沉弦肺之清肅不行脾之健運失常身中痰濕犯於上焦或行於下部漫無向愈之期非所宜也防己茯苓湯桑皮五加皮橘紅川椒目杏仁紫菀蘇子另金匱腎氣丸吳江村橋風邪從陽而親上濕邪從陰而親下下腫而延及於上上腫而纍及於中上下相移久而時發時止未有如今日之發而不肯愈也現在陰囊既腫大便既溏濕甚於風之候治濕為主治風次之然不喘乃妥五苓防己桑皮陳皮蔣無錫面部浮腫延及周身甚至脹滿又增咳嗽寒熱氣逆不得臥下二便失調脈形弦細此係風邪夾濕脾肺兩傷也臍已外突理之棘手防己黃耆湯合麻黃湯羌活米仁厚朴白芍冬朮又昨得微汗臥能得寐面之浮者稍退溺之短者稍長所用之藥似屬的對然余者未便舉以為喜防己黃耆湯去耆白芍冬朮厚朴腹皮羌活又浮腫日退一日似屬佳兆然在上者已可而在下者尚甚防己茯苓湯厚朴米仁腹皮羌活川椒白芍杏仁冬朮又邪之浮腫於外雖見日輕脹滿於中仍然見重口乾且苦溺短不長咳嗽氣短四肢逆冷脈形細小一飲一食一湯一藥無一舒者邪氣填滿脘中正虛不克消化也筋已露臍已突何從下手冬朮厚朴陳皮炙草大腹皮蘇子杏仁當歸白芍肉桂茯苓另小溫中丸徐金山頭惡寒發熱隱癖脹逆加之以浮腫溺赤嗌乾暑風外感引動宿病敗毒去貝殼加淡芩荸薺又進敗毒散腫脹雖減寒熱未除尚須加減清脾飲去朮草果加黨參防己又風邪脫入濕中脈來沖急大便溏泄浮腫寒熱頭痛勢非輕者防風冬朮葛根黃芩黃連湯茯苓防己五加皮又寒熱已除頭痛已止大便溏泄皮膚浮腫中宮脹滿土變敦阜削去乃妥胃苓去桂加防己又太陰腹滿不惟寒濕有餘而且真陽不足脈衝下體不溫幹不能飲妨食氣滿其勢頗險未便以寒熱餘邪為主治附子治中平胃半夏石王家溪閡瘧之風留之於濕曾經腫脹今春又發小有寒熱自汗不渴右脈濡左部弦既無便溺之陽格又無飲食之速和其治在表防脫防己茯苓桂枝冬朮黃耆桑皮陳皮腹皮薑皮汪上海面腫曰風足脛腫曰水風邪從陽而親上面部先腫引動濕邪而親下足跗亦腫如是者前後輕重不齊現在偏之於上白苔帶黃脈弦帶浮溺黃不多氣短不長風多於水是也不喘乃吉防己冬朮五皮旋覆花骨皮又風水有鬱熱之形防己石膏旋覆花杏仁蘇子滑石五皮楊宜興氣上衝胸之候頸脈動時咳陰股間寒足脛腫目下腫腹乃大臥不能正偃小便不利苔白氣短脈息沉微脾肺腎三經陽氣內虛不能運化濕邪垂成水腫也恐其喘甚桂苓五味甘草湯合小青龍湯加川附子制又昨進小青龍法已隔三時之久胸脘又見氣衝大便先通濁痰吐後則沖象甫平顯系脾經水濕濁痰阻結於中究恐喘甚而敗蘇子降氣湯又大便又通痰濁又吐阻結之邪尋路而出昨夜之氣衝所以免也然腹滿等症尚在小便不通肺氣不利脾經不運故而無向愈之期不得不慮其喘蘇子萊蔔子杏仁車前牛膝冬朮橘紅五加皮桑皮大腹皮赤苓澤瀉錢荊溪濕邪從陰而侵下下焦浮腫之時失於調治延及中焦大腹脹滿臍已突筋漸露飲食作脹小水短赤右脈弦澀左關獨浮過於弦濕鬱為熱陰分已虛近增咳嗽防喘理苓大腹皮漢防己陳皮蘇子杏仁另水泛金匱腎氣丸小溫中丸周嘉興足脛腫曰水水濕之氣聚於足消之化之猶易為也腫勢蔓延於上大股少腹皆形其狀甚至咳嗽氣急臥難著枕中上二焦均被邪所侵及清肅之氣已失其常防喘防己茯苓冬朮澤瀉豬苓五加皮陳皮杏仁桑皮蘇子骨皮大腹皮馬無錫浮腫咳嗽繼以嘔吐噁心曾經向愈而腫之痞滿獨不能除後即因此而嘔吐又作浮腫又增二便失調脈形細小苔白不渴足部硬冷陰虛寒飲使然恐其喘甚而敗桑皮腹皮苓皮陳皮五加皮杏仁葶藶芥子車前子白附子禹餘糧丸張松江腫者鍾也為水濕所鍾聚也鍾聚之腫每甚於足所謂濕則下先受之是也然獨在於下邪所當然而其自下腫上男子得之其病為逆據述此病頻發頻止脾虛不能制濕亦屬顯然四苓防己陳皮厚朴五加皮藿香浦嘉定浮腫自上而下自下而中中即脹滿咳嗽不爽無汗氣短胸痞妨食脈息浮弦風邪夾濕由外而之內也防喘苔白便溏溺短感邪已欲為熱熱亦宜清不能獨化風濕防己茯苓石膏厚朴杏仁澤瀉萊蔔子腹皮製半夏桑皮又胸之痞便之溏似屬漸和咳嗽不作更為美事而中宮之脹滿上下之浮腫苔白氣短溺少口乾脈息沉弦防食惡風等症正屬不輕防己石膏厚朴茯苓澤瀉萊蔔子桑皮車前子香附霞天曲浦嘉定足脛腫曰水水乃濕所聚也故曰濕勝乃腫然則腫者鍾也為水濕所鍾聚也今年歲土不及濕邪無路可消結而為腫欲消其所鍾之濕不能不崇其土茅朮厚朴藿香肉桂青皮茯苓半夏防己炮薑木瓜包史家巷濕鬱之熱為浮為腫為脹從下而延及上焦日甚一日苔白口膩嘔逆噁心溺短便堅加以耳鳴脈小左關一部獨見浮弦更有風引動於上焦容易增喘不能不慮五苓陳皮防風防己半夏取五皮煎湯代水又脈浮已和獨形弦象嘔逆雖止浮腫不消必得小便清長則上甚之濕熱或者下趨五苓陳皮半夏牛膝五皮飲煎湯代水又小便不長膀胱之氣化失其常度也既上之濕難以下趨徒增為熱口稍干齦帶疼脈亦弦中見數也桂苓甘露飲去石膏車前牛膝防風陳皮五皮飲煎湯代水吳盧州先腫後咳其治在脾脾虛不能制濕反易生痰不但脾家自腫而且纍及肺金為咳勢已不輕加之形寒飲冷肺氣更傷腫滿按之作痛咳逆不爽惟見薄痰飲食遞減溺短便溏脈形郁小病勢有加無已竊恐清肅不行健運失常陡然氣喘而敗實必顧虛瀉必先補昨日行之毫無動靜想是虛處有益實虛處無補將開鬼門潔淨府兩治立方五苓合麻黃湯用肉桂又昨日兩法並行自云合意病邪之宜乎分散不問可知再以小青龍法合而用之照前方加小青龍湯鍾松江浮腫經年漫延於肺咳喘痰涎理之棘手麻黃杏仁石膏甘草冬朮吳山西面部之腫延及中下兩焦溺色短赤舌苔黃濁口味干甜脈形弦數風邪襲入濕熱之中不喘乃吉桂苓甘露飲陸俞家橋痧後之紅瘰時發發無定時亦無定處俗名其怪實即痧邪未盡也夾濕則下焦腫爛招風則上下浮腫浮腫之形未交一候遍及周身風性之善行而數變也不問可知防喘茯苓防己茅朮防風枳殼五加皮萆薢荊芥通草劉朱家角胸脘痞塞一身浮腫咳逆少痰不能臥下舌苔薄白小溲甚少脈形沉小此係痰食濕交結不解其氣易塞咽喉恐其喘厥而敗且以降氣法施之蘇子歸身橘紅炙草前胡肉桂川朴乾薑沉香杏仁痹症何松江風寒濕三氣雜至合而為痹痹久則三氣之邪未有不鬱而為熱熱處濕中變為大筋軟短小筋弛長軟短為拘弛長為痿痿少拘多濕熱之邪留於大筋為勝舒筋一法在所必需苡仁歸芍白蒺藜丸威靈仙木瓜牛膝桑枝周無錫風寒濕三氣雜至合而為痹痹從腰部腿骱而下寒濕為多苓桂術甘蓯蓉牛膝木瓜防風防己當歸秦艽李光福風寒濕三氣雜至合而為痹溫化為宜桂枝湯二陳茅朮羌活萆薢牛膝當歸松節周吳江周痹減半而其所痹之邪尚留於肩臂脅部肺肝兩經都被風濕之痰所阻指迷茯苓丸海桐皮川斷白芥子蠲痹去耆草張江陰風寒濕三氣雜至合而為痹若風氣勝者為行痹若以春遇此為筋痹此間之痹四肢遊行發於仲春之候指臂強而難舉左關脈息弦急因風而成筋痹不問可知羚羊角散去獨活芎防加羌活片薑黃甘草緑豆衣龜版顧光福右肩臑痠痛延及臂肩左脈芤數而浮血虛招風所致右屬肺肺氣所主久貯之痰從而和之為患兼理為宜蠲痹湯去防加指迷茯苓丸生薑秦東山瘧中之風濕痰邪竄入經絡以致右肢痠痛筋脈不舒漸及於左一手偏熱口中乾苦脈象弦數肩背亦有不和之象此名痹症牛蒡子散合蠲痹去防加茯苓炙草羚羊角桑枝大師長興肩臑臂痛之經絡都在三陽而其纍及陰經者不過十之一二本非內病可知然遺精日久曾患痎瘧又值心力俱勞之體陰血大傷不免有血不養筋之義經筋為患漫無愈期所以六脈細小而左關一部獨形浮大也湯丸並進乃妥蠲痹湯陳泉州會館痛痹偏之於左且有痿而不舉之形脈息浮弦血虛之體風邪乘此而入也理之不易蠲痹加大生地木瓜天麻張湖州肩背痠疼形寒少納咳嗽久而如此營虛血痹風痰交阻於中不能化解也蠲痹湯指迷茯苓丸沈青浦氣血兩虧肩臑之痛延及手臂動則如此靜則尚安非補不可之候然風痰之留落於其間者不能不兼理之八珍蠲痹去防加指迷茯苓丸張上海大股紅腫作痛延及於膝且至脛骨亦有所傷本屬風寒濕三氣雜至合而為痹也久而不愈膝骨日大而重伸而難屈脈形沉細而弦欲成鶴膝風不可忽視獨活寄生湯四物湯去芎加四妙苡仁松節孫平望最虛之體便是容邪之處處瘍之後血分暗虧虧則風濕之邪乘此而襲臂肩作痛自右而移及於左且兼項背𠘧𠘧兩肢難舉以冬遇此者為骨痹以春遇此者為筋痹也亦宜先從筋痹立方羚羊角散去獨附加川斷烏藥孟常州膝骨日大上下漸形細小是鶴膝風也鶴膝風乃風寒濕三氣雜至合而為痹之最重者三氣之邪既可為痹於膝豈不可以挾肺之痰痹於肘耳蓋肺有邪其氣留於兩肘肘之所以痹於左者左邊屬血血屬陰陰血既虧無怪乎腰脊之凸出接踵而來也據述腰痛於前咳嗽於後肺與腎經先受風寒濕三氣之邪鬱蒸為熱所以鼻流清涕小溲常黃脈形細小左關獨見弦數右寸獨形滑象甚至身體偏側肌肉暗削行步無力虛態百出恐其難以支持因病致虛而脫羚羊角當歸白芍桂枝杏仁知母羌活苡仁制蠶秦艽桑枝竹瀝茯苓潘南匯一臂不舉此為痹載在風門即名風痹也亦宜然此痹起於外瘍陰血早虛虛則風邪內襲未免有之古人之治風先養血非無意也四物川斷烏梢白蒺藜苡仁橘紅錢湖州病後遺邪於筋筋從轉後背作疼變為下體麻痹屈而不伸以致大筋軟短軟短為拘也羌獨活熟地炙草苡仁茯苓木瓜歸身澤瀉桑寄生牛膝秦艽於術香附制蠶鎖陽丹皮白芍五加皮朱平湖陽明繞遍一身諸絡風熱之邪曾傳陽明陽明之血從上而溢既溢之後一身諸絡有如蟲行皮中狀是熱去風留也白蒺藜丸防風桑皮陳皮忍冬藤赤芍苡仁徐太倉濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿此乃不痿而拘拘之為病濕熱邪氣獨在於大筋不言而喻然軟短之拘雖為濕熱之不攘而濕熱之中似乎濕勝乎熱所以脈弦濡小帶有數意舌苔滿布帶些黃意溺不變口不渴四肢痠軟經筋痠疼甚至下病及上以昭濕則下先受之之義羌活勝濕湯一法最為第一要著羌活茅朮茯苓防風橘紅金狗脊半夏木香藿香秦艽香附白蒺藜炙草當歸瘧周吳江三陰大瘧變為日作陰經所伏之邪從陰而出大妙大妙孰知瘧發日晏一日所感風邪仍從風府而下蓋以三陰之陽衰而不旺不能乘勢托出其邪反被邪乘虛入虛者益虛飲食大減肌肉暗削身熱無力大腹軟滿足跗浮腫脈微無神所謂無陽則陰無以化也際此冬至陽生之候而有如此病情危乎危乎桂枝附子理中湯鱉甲白芍鹿角霜朱無錫痎瘧面色蒼黃皮膚浮腫食則腹瀉自云痞滿舌苔滿布溲液渾濁此係風濕之邪歸併太陰也不增喘脹乃妥桂枝附子理中湯防己陳皮草果仁程竹行頭但熱不寒之瘧渴喜熱飲苔膩節疼脈微自汗邪盛陽虛究恐不克支持而增昏喘栝蔞桂枝湯理中四獸飲俞台州三陰瘧後小溲見紅又兼白濁復為寒熱似瘧日夜分爭而作左脅瘧母乘此升逆口乾脈弦顯繫留邪於肝脾兩經不宜再厥一柴胡飲去陳皮加鱉甲牛膝歸身另鱉甲煎丸丁常熟三陰瘧疾汗多而不發渴寒濕為多寒之餘加以夢泄邪入於肝也制首烏製厚朴鱉甲白芍小青皮煨薑生於術歸身炙草草果仁雲苓白蔻仁秦海州間瘧變為三日一作寒重熱輕脘腹脹悶口鼻乾燥而不發渴脈形細弦舌苔薄白想是暑濕內伏又有燥氣加臨清脾飲去芩草果加桑葉陳皮神麯藿香夏上海瘧屬脾寒寒之為言非溫非熱乃陰象也陰寒之氣聚於脾經發於陽明寒熱往來間日而作喜飲熱湯舌上苔白膩而濁脈息濡小之中隱隱帶弦面上之色黃中帶白汗出不少小溲夜多少納少寐噯氣不舒際此冬至陽生之候而患如是見證陽之虛也甚矣惟其陽虛則陰寒之邪更不能消所病之瘧無怪乎漫無愈期急須溫化桂枝湯加首烏青皮陳皮歸身茯苓厚朴半夏草果包王天井巷三陰大瘧名曰痎瘧閡者老也言瘧老於三陰之界漫無愈期近來自覺神呆且形痞硬苔白脈遲陽氣漸虛不但不化瘧邪而瘧邪反欲成臌也急須大補脾陽附子理中湯加桂枝厚朴陳皮半夏茯苓鹿角尖吳太湖上瘧疾中之寒熱久而未了咳嗽不止夜重日輕口中乾苦舌紅苔黃風邪濕邪深入營中無從化解也四物桔梗湯瀉白加青蒿鱉甲丹皮尤光福痎瘧日久黏汗頭眩脈形細而隱弦此虛也不可以作實治何人飲去陳皮加炙草白芍牡蠣茯神花粉吳關上進脾胃法嘔惡已止納食亦加痎瘧仍然隱癖僭逆中宮脈形弦細舌苔干膩暑邪正甚陽氣內傷清脾飲去朴芩加四獸飲木瓜牛膝馬甘露寒熱如瘧久而不已口中乾苦少寐少納咳逆脈細弦數陰血內虧留邪於肝也四物湯去芎加羚羊角青蒿鱉甲沙參川貝防風杏仁去皮馬黎里痎瘧日久右脈弦細左部模糊元陽元氣都被邪侵桂枝湯何人飲加半夏另金匱腎氣丸瘧歇日服王沈店橋痎瘧日久氣陰兩傷右脈小左脈弦數口乾舌紅神疲盜汗少納言微養中寓化為主川芎鱉甲當歸生地淡芩人參花粉川貝橘紅史芝苓巷痎瘧生於陰也陰中之陽不足則所感風寒濕氣無力以消來勢稍輕而其移早移晏自無定期桂枝湯加鹿角霜當歸杜仲香附白薇二陳湯周香山瘧疾本屬脾寒寒熱往來兩輕一重又有三陰大瘧之根腎氣更弱必須溫化鹿角霜桂枝冬朮草果仁當歸青皮川朴半夏陳皮穿山甲鱉甲茯苓秦海門三瘧皆生於陰陰經之邪無陽以化所以寒重熱輕汗多不渴項痛腰疼苔白氣喘脈形弦細右尺上衝甚鋭恐其枝葉未害本實先拔而有不克支持之變慎之慎之桂枝湯合附子理中加青皮草果仁龔崑山寒熱往來少陽症也仲景早用和方然小柴胡一湯如遇口中乾咽中痛往往撤去半夏而用花粉蓋為熱傷陰耳如此類推則活潑潑地矣小柴胡去半夏加栝蔞根湯人參易洋參加元參川貝白芍鱉甲嚴按二師心古法巨眼如燭潘震澤三陰大瘧日久而輕小有寒熱口乾溺赤體痠加以咳嗽濃痰想是瘧已傷陰不耐風寒新感也小柴胡湯去半夏加栝蔞根湯瀉白散鱉甲川貝橘紅枇杷葉馬陸暮寒熱日作邪並於陽矣然其所自來者三陰也究須溫化桂枝湯合何首烏散二陳加當歸鹿角尖鱉甲秦艽張寶山寒熱往來所發之期或一日或兩日或數日此瘧也桂枝湯合小柴胡湯加草果檳榔橘紅茯苓神麯陳楓涇但熱不寒之瘧渴喜熱飲苔膩節疼脈微自汗邪盛陽虛究恐不克支持而增昏喘四獸飲加桂枝金洞庭山三陰大瘧瘧邪傷營血從咳嗆而出法當養化未便用溫生地當歸青蒿知母苡米川貝白芍丹皮鱉甲茅根枇杷葉沈西匯風寒之在三陰者漸從外達尚被濕熱濁痰所阻寒熱分爭自無一定之期舌苔黃濁然元陽不足究難盡達小柴胡湯合何人飲加鹿角霜鄭港口濕熱召暑風亦隨之寒熱往來間日而作舌苔滿布而白脈息浮弦頭痛口乾噁心多汗小柴胡湯加羌活藿香厚朴橘紅大腹皮汪西匯頭痛之餘腰痛痠疼始而小有寒熱後來變為間瘧苔白味辛胸痞妨食便溏溺黃渴喜熱飲脈息浮弦暑風外感使然選奇湯合藿香正氣去蘇大腹皮加柴胡顧青浦痎瘧皆生於陰陰者肝脾腎三經也脾腎之脈猶可而肝之一部見於左關者弦而且浮必有外感之風留於肝部良以風喜傷肝肝為風臟物以類聚耳桂枝湯合柴胡湯何首烏散加鱉甲歸身張關上寒熱往來既不能除又無定時變為痎瘧已經六五發矣脈形弦細痞悶不開舌苔薄白飲食甚少近更咳嗽口淡溺黃暑風濕熱歸併三陰不言而喻清脾飲加羌活雞內金俞斜港三瘧變為間日而作盜汗隱癖虛里穴跳耳鳴筋惕肝陰虛也不獨餘邪為患而已桂枝加龍骨牡蠣湯施平望冬時內不能藏精外易以傷寒寒藏精室不為溫病必變溫瘧溫瘧之形不一此間先寒後熱甫經得汗而退而又形寒自汗然後退清此等邪氣自內而達於外其所未盡達者旋由自外而歸之於內虛使然也十數發後往往不克支持而此病已患四十餘日精神不見大衰想是先天本足邪雖出入於腎家猶可相安於無事但自汗太多肉削少納言微畏寒陽虛已著虛波陡起不能不早以慮之然補中寓化已屬一定章程惟酒客濕熱素勝小溲短赤舌苔滿白用藥最難六味合桂附桂用桂枝真武加黃連陳南京三陰痎瘧音爍於上腹膨於中便溏於下三焦又病可知三陰病於前三焦病於後也舌苔冷白四肢厥冷脈息全無陽分比陰分更虧且至有陰無陽而欲絶也勉擬生陽一法然恐鞭長莫及來復丹米湯送下又一陽來復脈尚模糊雖無暴出之憂而少微續之喜不足恃也生脈散煎送來復丹張太倉三陰瘧右脈細軟左太弦急脾濕有餘肝腎不足八珍湯去芎加橘紅半夏青蒿丹皮鱉甲沈西匯痎瘧變為日作邪從外向可知然脈弱體酸胸悶少納元氣內虛無力化邪之候只宜養化以冀虛波不起為妥何首烏散加神麯黨參又元虛內不耐瘧邪發作外不耐暑氣所侵防喘何人飲合首烏散又痎瘧不歇有根未發以前已形氣短既發以後更加氣喘恐其正不克邪而敗何人飲加紅棗竹瀝葉周王廟弄瘧發四未先見痠疼繼以小熱然後寒大作汗出漸解舌苔多白並不發渴脈形濡小一輕一重已以一月有餘顯系先患風濕後患暑邪氣血同病也清脾飲加歸身防風又寒熱仍然經絡有收縮之形手足指冷本身之陽氣素來不足無力化邪也柴胡歸身白芍冬朮茯苓紅棗桂枝木瓜白薇生薑炙草張上海痎瘧日久一載有餘輕而未止癮疹外發瘙癢異常咳嗽日久痰出不少舌苔尚白溺色猶黃脈形弦數所患風邪暑濕欲從三陰傳出肺經而不能暢達也何人飲去煨薑合追瘧飲去朮加杏仁淡芩白疾藜王太倉痎皆生於陰陰經受濕招風右脈小左脈浮足腫不退脘痛時作鼻衄易見小溲色黃所患風溫之邪鬱蒸為熱布滿三焦而不能從營衛以暢達也邪發營衛之時出入相爭寒熱不重亦不口乾亦不求救於水是濕更重於風也清脾飲去芩加木瓜防風沈竹行頭病轉為瘧瘧以三日一發者所感暑邪深入三陰也經事臨期治須兼顧柴胡四物湯去夏加瓜蔞白薇鱉甲又熱重於寒口乾頭痛苔白舌紅脈形弦數乾咳少納陰血內虧不能速化留邪之兆照前方加丹皮知母秦艽穀芽高蘆墟濕熱之間瘧內因勞倦傷脾外因寒邪入腎所發寒熱變為三日一作理之不易清脾飲去芩加細辛又得汗則寒氣先消而暑濕熱三氣之邪尚在三陰之界無力以消所以脈形細小之中而帶隱弦何首烏散加二陳當歸陸嘉興痎瘧皆生於陰陰者三陰也三陰經深受風寒濕老於其界所以寒熱往來止而復作口不渴苔黃濁脈弦而數四肢微浮扶正達邪方為正治桂枝湯合何首烏散加茯苓當歸瘧來日前二時服另附桂八味丸三錢瘧歇日淡鹽湯朝服李花街巷寒熱有往來之意口中乾苦舌苔薄白脈細弦數少陽見證也當以少陽之法和之但絡傷之體血分本虧往往有營虛不能作汗之弊將此意治合而用之至於咳嗽日久不過兼治而已未便為主小柴胡湯合歸柴飲瀉白散廖奉賢三陰瘧邪曾經歸腹而腫幸爾已結瘧母其邪竊踞於肝膽所以身熱又如瘧狀似夾雌雄脈形弦細苔白不渴溫化為宜清脾飲去芩柴加川附牡蠣白芍陳皮又痎瘧仍屬雌雄而作苔白不渴腹部又有腫意邪盛正虛舍溫化奚為清脾飲去柴芩草加香附桂枝炒楂木瓜又瘧之雌者已愈雄者亦輕豈非美事無如臍之下旁有內結按之則硬動之隱痛苔白且滑脈弦而小陰結陽虛所致川附茯苓桂枝於術陳皮木香制蠶牛膝當歸白芍半夏曹湖州痎瘧變為日作三陰之邪移出陽經矣然陽經所受之邪尚屬不少小有寒熱寒熱雖止而營衛分爭之象仍未脫體舌苔嫩黃脘腹不舒小溲短赤夜寐少安咳嗽吐痰肢體無力脈形細小邪少虛多之候扶正為先積邪自去何首烏散去薑合何人飲加青蒿鱉甲淡芩丹皮陳周莊寒熱往來口中乾苦舌色光紅脈弦而數此伏暑化燥而發陰氣早傷如欲提出其邪勢必兼顧其陰柴胡白芍淡芩花粉甘草當歸大生地沙參陸浦莊寒熱往來口中乾苦舌苔白膩脈象弦數伏暑見症也久咳且嗽之體兼理為宜小柴胡湯加玉竹桔梗某間瘧橫連募原者也轉而為日作道不遠氣不深矣似屬可喜然有輕重之別轉者在衛重者在營營分之舊邪未已而衛分又受新邪新邪包之於外舊邪更不能消比之輕重相等日衰一日者未可同日語也至於無痰不作瘧瘧久傷陰痰多咳嗽而兼血者總不出乎此意何首烏散合清瘧飲去栝蔞合何人飲加紫蘇川貝周崇明痎瘧皆生於陰陰者三陰也三陰之邪孰多孰少少陰雖虛虛者遺精太陰獨實實則面色黃滯厥陰則虛實各半寒熱往來渴喜熱飲動則兩脅隱痛所以左脈細小而帶隱弦右部弦急而滑欲治其瘧先重清脾兼和肝腎不問可知況浮腫之邪尚有留於脘腹者更宜著手清脾飲加首烏當歸陳皮腹皮蓮鬚梔子沈湘城痎瘧八閲月矣而尚寒重熱輕頭中脹痛喜飲熱湯無汗而解所感風邪誠伏三陰之界而衛中之陽氣營中之陰血安在哉法當調和營衛以使所伏之邪且化且達桂枝柴胡湯去芩參合清脾飲加歸身薛嘉善不寐心悸肝病也病則肝虛虛則招風風則寒熱寒熱之邪襲入肝經則為痎瘧痎瘧之邪布於陽明則為時病時病之邪仍歸肝部則又變為痎瘧大生地歸身白芍秦艽鱉甲青蒿丹皮川貝陳皮胡光福司人生之陰陽皆有樞機邪從陽樞而出則為痎瘧邪從陰機而入則為泄利此間三陰大症雖經十有六發尚屬邪從外達昨又加之以泄日夜四五十行又屬邪從內陷瘧痢並行元氣更乏況六旬以外之年精力久衰何堪磨耐假使中土皆旺者猶可生生不息乃一飲一食大減於前反有痰涎上泛嘔噦噁心甚至瘧歇兩日亦小有寒熱以昭脾胃營衛無一不虛無怪乎神昏遺溺於瘧時氣墜肛門於痢前即不熱不痢之際火升面赤少寐多煩等症不一而足脈息芤弦者如此大非所宜病情既有出入藥餌自宜升降然升則虛陽隨瘧而升降則濁陰隨痢而降各有偏弊則陰陽更加不固斟酌其間惟守中以和營衛化氣以通膀胱出一理苓湯法理苓湯即理中湯合五苓散方便血彭上海心肝所生所藏之血不能統之於脾滲入下焦鮮者紫者盡從糞之前後而出久而久之面容黑瘦脈息芤弦飲食大減將有浮喘之形慎之慎之黃土湯阿膠用蒲黃末拌炒又芤弦之革脈稍和所患諸症自屬安適前方的對無疑所嫌小溲渾濁內痔作痛亦須兼理黃土湯阿膠用蒲黃拌炒合赤豆當歸散又溫通瘀血革脈已和獨形芤象腹痛已除尚下滲血痔痛溺濁飲食雖增口舌乾痛陰虛留熱暗傷營分可知仿以黑止紅意黑地黃丸合赤豆當歸散槐花散鄭寧波心生之血脾氣虛者失其統領之常不能藏之於肝反為滲入腸間血從大便而出誰曰不然而不知滲之已久不獨氣從下陷而且陰絡暗傷暗傷所有之血無不從穿處以行有如輕車熟路漫無止期營衛肌肉皮毛筋骨有損無益自知不覺支持飲食減少言語無神脈形芤澀而數歸入虛勞重候也勞者溫之虛者補之原屬一定章程但血之下者似屬漏卮情狀如不以久塞其孔之法治之雖日從事於溫補亦屬徒然黑歸脾合赤石脂龍骨牡蠣阿膠伏龍肝馬上海脾統血肝藏血統領失常所藏者少則左關脈息雖旺而芤大便之餘帶血不已舌苔黃燥者如此法當清養兼施加味歸脾大生地地榆施吳江脾虛不能統血或脫於上或脫於下補脾之虛以攝其血尚易為也惟凝滯於中中宮變出塊壘者腹部脹滿最為難治難治初非不冶然亦竟無許治之理四物湯合丹參炒楂茺蔚茯苓炙草淋濁汪北壕氣淋帶濁溺後更疼左脈大將見血之兆也速宜靜養導赤合大補陰丸加茯神沈青浦熱鬱下焦血淋久而不已脈數左部帶大腎水大虧心火失其所濟下入小腸而出之膀胱經也大補陰丸加牛膝歸尾赤小豆血餘炭吳吳江陰虧之體心火下郁小腸傳入膀胱之府尿中帶血時作時止左脈沉數小溲不利大補陰丸加牛膝合導赤火府另服大補陰丸李通州腎虛乃膀胱受熱尿血成淋脈形沉數清養為宜大補陰丸加歸尾血餘炭琥珀屑邵乍浦欲便不通不通而痛此淋也脈細而見弦數幹不多飲必有留熱未清不獨下虛而已若論咳嗽又屬新感栝蔞瞿麥湯去附子加麥冬杏仁草梢蘇吳江夢遺之體變為淋濁已經一月之久尚難向愈金匱法主之栝蔞瞿麥湯去附子合封髓丹加智仁梁長安小便頻數而赤或渾濁或紫塊脈象沉數此淋症也大補陰丸加瞿麥又膏淋血淋同病下焦未有不因乎虛亦未有不因乎熱熱如化盡則膏血之物庶幾下而不痛始可以獨責其虛大補陰丸合栝蔞瞿麥湯去附子加牛膝血餘炭又血淋漸止膏淋亦薄所患之熱原有化意必須化盡乃妥照前方加萆薢黑梔又所下之膏薄且少矣然當便之時尚屬不利已便之後反覺隱疼肢膝不溫脈小左弦唇紅嗌乾熱未全愈虛日益著栝蔞瞿麥丸去附子加萆薢黑梔麥冬豬脊髓華蕩口膏淋變為血淋久而不已脈數左弦腎被熱傷大補陰丸加血餘炭珀屑歸尾張江陰膏淋日久少腹不和口乾腰楚腎虛濕熱使然栝萎瞿麥丸去附子加杜仲萆薢五倍子青鹽馬乍浦小便不利為癃痛者為淋淋雖有五而其致病之由多屬乎熱而況水液渾濁皆屬乎熱更有明證栝蔞瞿麥丸去附子合導赤加萆薢錢常熟尿血成塊小溲作痛脈數苔膩濕熱下注使然導赤散加淡芩小薊血餘炭赤苓燈芯另大補陰丸嚴東山漏久頭痛之體水虧木旺不問可知邇年小便淋痛其狀如膿遷延不已衰而復盛然其所出者不過水濕渾濁苔白口乾足冷轉筋左關脈硬寸部浮急右惟濡數而已必有心火濕熱下注於腎與膀胱也理之不易栝蔞瞿麥湯合導赤火府裘新街血淋日久不痊加以咳嗽時作脈息左細右弦俱見數象口燥苔黃想是中宮濕熱上下充斥陰液受傷也大補陰丸合麥門冬湯唐無錫胞移熱於膀胱則癃溺血水液渾濁皆屬於熱小腸有熱者其人必痔具此三者而病於一身若不以涼血之品必有性命之憂導赤合火府丹加燈芯丸方大補陰丸合固本丸方加萆薢豬脊髓為丸陳海寧心經鬱火下火小腸變為淋症曾經見血者恐有瘀血內阻而喘不獨現在之蒸熱口糜為患也導赤散加栝蔞根瞿麥懷藥淡芩金關上尿血成淋小便時無血亦疼兩月有餘之病脈數苔白嗌乾濕熱傷陰也大補陰丸加車前麥冬燈芯血餘炭又血已止痛未除病雖減半尚須小心導赤合火府丹大補陰丸加麥冬車前燈芯又生心血通水道六味丸加車前竹葉另天王補心丹楊專諸巷曾患淋症小便本難近來小便又淋變為癃閉少腹硬滿小便腫脹苔白不渴脈小而沉下焦濕熱被寒所遏膀胱之氣化不洗最為急症恐其喘汗慎之五苓散加木香烏藥枳殼桔梗二味磨蔥一大杷麝香三釐打成一餅微溫放臍上周平望濕熱不攘大筋軟短小筋弛長弛長為痿痿病未痊又來尿血近更為淋脈形細數陰分更虧丹溪法主之大補陰丸加血餘炭雞蛋張朱家園白濁淋症之象久而不能根除小溲雖黃並不作痛口膩苔濁嗌乾色滯濕熱傷精精從下漏使然封髓丹合三豆飲另豬肚丸朱嘉興肝腎濕熱不留於中必犯於下下焦膏淋血淋以及小便無端而痛之氣淋時發時止現在膏淋獨見脈象弦數白苔滿布加以氣從少腹左升仍不外胃家濕熱襲入肝經攏動精房也六味丸另豬肚丸又氣淋不已勢必兼之乎膏重之以血下焦營衛無不受濕熱所傷六味丸萸肉易芍胡連牡蠣洋參另豬肚丸張浦東濁淋日久繼之以膏重之以血歸入下消門也固本丸合黃連解毒湯加沙參陳祟明濕鬱為熱變作沙淋有如煮海為鹽之義病經半載左尺脈浮按之弦數陰分已傷正須兼理六味丸加海金沙石葦知母黃柏張浦東痛之緩者邪之輕也膏之淋者陰之虛也痛減藥亦宜減沙參固本合黃連解毒加萆薢另豬肚丸又血淋雖止膏則仍然補陰不足瀉火有餘大補陰丸去豬脊髓合固本加沙參萆薢砂仁另諸肚丸又脾氣下陷則濕熱隨之而腎陰之虛者容易滲入精房補益中氣之法調補並行為要三才封髓丹合補中益氣湯去朮加萆薢另豬肚丸威喜丸林南壕淋症見紅孰不知其為熱至於見沙亦煮海為鹽之義不能不定為熱熱邪已久可以或有或無之淋象是虛多於實也固本合大補陰丸加西洋參石韋海金沙林南壕陰虛濕熱膏淋帶血帶沙沙與血淋已愈而膏則仍然虧內尚帶血沙兩意脈弦細數養化為宜固本合大補陰丸黃連解毒加黨參朱關上陰虛濕熱白濁血淋兼而有之久則氣陷不升苦不勝言補中益氣合三才用生地滋腎丸煎送又溺病有前後之分痛在前者濕熱為多痛在後者陰虛為甚濕熱漸化溺前之病自衰陰分仍虛溺後之疼不罷三才封髓丹陳太倉陰虛則小便難難之為日已久變而為淋溺管中隱痛海底亦然然僅有白濁之形尚無血淋之意一則以喜一則以懼究須謹慎小心栝蔞瞿麥丸去附子加牛膝合導赤散孔鞠花亭濕熱傷精夢遺不作變為白濁下行而其行之不暢者留於海底紅熱作疼陰虛濕汗加以瘡瘍外發脈反郁小而數舌苔膩白理之必費周旋萆薢分清飲去菖蒲加龍膽草車前子茯苓魏姚弄白濁成淋濕熱之邪所致萆薢分清飲周聞德橋腎與膀胱相為表裡腎虛則溺後餘瀝膀胱濕熱則溺前見濁溺之前後同病而實表裡相通虛實各半之證也三才封髓丹楊震澤敗精成濁常流不息甚至肢體無力下部不溫此虛也當以封法三才封髓丹施松江熱淋變為血淋脈形細數細屬陰虧數為邪火清補為宜大補陰丸合導赤火府加燈芯血餘炭吳嘉興瘧邪與疔毒竄入大經小絡歸併膏淋膏淋不罷邪又流入於腎肛門前後之氣盤旋痠痛襲入於沖左腿內廉之經脈麻木抽痛病情自上而下勢必自下而上以出之不惟化導而已萆薢分清飲加升麻柴胡陳皮白芍又得汗則淋痛大減升降同用之法已為合作然壅者尚未因宣而全去滯者亦未因通而全消所以膏淋不盡陰莖作癢肛門與左腿麻木抽疼留而不去仍取宣通以盡其邪為妥萆薢分清飲加歸尾白芍升柴柴胡陳皮陳海門血因胬肉而瘀瘀在海底附在筋經自幼作疼至今未愈脈形沉澀理之不易桃仁七分制軍三分炙草五分桂枝三分歸尾五分紅藤五分烏藥木香二味未抄藥量又進桃仁承氣湯當便之時海底已能不痛陰莖尚帶癢疼澀脈漸有和意顯系所瘀之血消者已多而其留落者一時未能掃除也去瘀生新為治之中仍以毒藥寓之大生地當歸白芍阿膠桃仁桂枝制軍丹參接服方六味加當歸丹參阿膠赤豆周松江淋症有五膏居其一久而日甚一日舌苔薄白脈小左弦俱見數象此係濕熱之邪傳入膀胱且有肝火竄入其中也不增喘乃妥萆薢分清飲加萹蓄一錢又分理濕熱淋症仍然惟淋後之大便未必如前日隨之而下所患濕熱似有分利之機然腎主二便開竅於二陰後陰之竅既隨前陰而欲通腎亦病焉不獨肝火從之為患而已照前方去萹蓄加兩頭尖二十一粒施浙江濕熱下注為濁色黃而濃諸節痠疼且兼紅腫牙齦作脹飲食不思舌苔白膩大便不調法當分理萆薢分清飲去菖蒲合導赤加大豆卷苡仁程小園上陽虛於下血痹於中少腹硬滿如石小溲滴瀝而下比之不利為癃更進一層恐增喘汗而敗五苓散加滑石二錢包白魚十四個木香一錢五分牛膝一錢五分鹽水炒另抵當丸五兩研細末醋蜜蔥汁調塗硬處又硬者稍紅癃者稍利將前方守之可也照前方加戎鹽一分又小便似和而不能暢通少腹似和而尚硬滿舌苔濕白脈息微弦陽氣大虛無力以通其痹也五苓散加川附七分木香二錢韭子三錢歸尾七分桃仁一錢五分穿山甲四分又病情如昨濕白之苔漸變糙色脈形帶數所結之邪鬱而為熱陽虛難化也五苓合滑石白魚散加木香韭子檳榔煎送抵當丸二錢又大便已通瘀血食積未有不從此而去然腹之堅者雖軟其形尚大苔色嫩黃口乾溺熱脈形弦數小溲通而不利濕熱鬱結於膀胱勢所必致四苓合青囊丸加韭子三錢木香滑石白魚四個檳榔沉香一分吳吳江膏淋日久往往變作血淋知柏八味金溪港血淋日久泌別無力不獨小腸之血傳入膀胱而已成之糞未歸大腸者亦隨小腸之血滲入膀胱而俱出昔人云與交腸有間者大都類此然則大便之漸祕不能不早以慮之八正散遺精章江陰腎者主蟄封藏之本精之處也精者所以能處於腎者全在腎氣本足封藏自不失其所職如虛則反是增出脛痠體倦口苦耳鳴便堅等症勢所必然然左尺之脈浮而不靜固昭腎氣下虛而關部獨大獨弦獨數舌苔黃燥厥陰肝部又有濕熱之邪助其內火火動乎中必搖其精所謂肝主疏泄是也虛則補之未始不合實則瀉之更為要著三才封髓丹加龍膽草黑梔柴胡又久積之濕熱從大便而泄且兼穢濁之氣從上而出未始不可然久病之體脾胃元氣內虧又不宜再下當從守中法異功散加白芍荷蒂粳米又大便暢行干苦亦愈左關之脈大者已小弦數仍然尺亦未靜可以前方加減三才封髓丹加茯神膽草柏子仁又大便已和脈形弦數數為有火弦主乎肝肝經既屬有火不但順乘中土而且容易搖精精雖四日未動究須小心三才封髓丹加陳皮白芍另豬肚丸彭江陰肉雖為牆筋不為剛良由無夢而遺腎虛不能攝精失其作強之司耳三才封髓合水陸二仙加龍骨牡蠣五味馬王莊精濁日久尚未了了又夢遺見血顯系精血內虧俱被濕熱所傷所以左脈細小右脈弦數三才封髓丹另豬肚丸施蘆店夢遺日久腰部作痠是腎虛也脈形濡小左寸過大舌苔白膩濕熱傷精而動者有之心火太旺不能下交於腎腎氣下泄者亦有之此兩端為要不獨填精補髓而已熟地歸身杜仲炙甘草於術茯神棗仁半夏陳皮黨參彭溧陽肝主疏泄腎主封藏疏泄太過封藏失職夢遺時作小便餘瀝甚至腰背俱痛足膝無力苔白舌紫脈形細小左關獨大獨弦久而久之寒熱溫涼之品備嘗不愈想是藥之難得其宜也九龍丹去萸肉加炒楂龍膽草又肝腎兩經都被濕熱所傷以致精房不固所以左關脈息獨大獨弦余則皆形細小也九龍丹加膽草牡蠣另豬肚丸威喜丸葉上海腎者主蟄封藏之本欲本之固勢必大補腎陰九龍丹去蓮肉須加黨參固本丸陸常熟肝主疏泄腎主封藏封藏之失職都從疏泄而來三才封髓丹另豬肚丸威喜丸徐太倉腎者主蟄封藏之本精之處也精乃無夢而遺腎失封藏之本未有不用蟄方蟄者蟄其精也然精之所遺已有三年之久陰分暗虛虛者熱從內起蒸之於衛則肌膚灼熱郁之於營則手足心熱現在手足之心獨熱口乾多飲脈來細數甚至氣不宣通背脊疼少腹不和肢體無力病勢有加無已竊恐夏至之一陰不生而有多將熇熇不可救藥之嘆擬四物二連合清骨飲法先化其熱後繼之以補陰封髓循循有序則庶幾焉四物二連清骨飲去青蒿加韭子藕汁又進前方背脊之痠痛隨即向愈而內熱之蒸蒸尚與前日相同此如不罷勢必津液重傷早以甘露法參入用之未始非防微杜漸之一術也四物去芎加二連淡芩骨皮川斛大生地麥冬天冬枇杷露藕汁馬胥門無夢而遺勞則為甚且兼形寒膝痠此脾胃兩虧封藏不固於內衛陽失護於外也補中益氣合封髓加制首烏牡蠣又師轉形之寒膝之痠與衛陽之法而愈即無夢而遺亦未再作未始無固精之功也然腎為先天之本三陰之蒂腎氣足則精處其室而關門自固腎氣虛則封藏失職而無夢自遺當以九龍法繼之於後九龍丹朱橫涇腎主二便開竅於二陰大便一用其力精先外泄是腎虛也河車大造丸吳四擺渡遺精有三每以瓶中貯水者為譬此間脈息不浮不沉左關一部獨見大弦既非水滿之覆又非瓶破之漏是肝經火旺搖動其精有如瓶中水外被物所激而出也加味黑歸脾去遠志加龍膽草丸方三才封髓加味黑歸脾加牡蠣飛尸遁注癆瘵之別稱言其相互傳染之義史通州風邪從陽而親上加以尸氣和之為脹桑皮陳皮羌活防風枳殼桔梗水安息一錢獺肝五分磨沖施崇明途中遇風作痛痛從胃脘之上後及於背旁及於臂動則如此靜則可安已經一載有餘不能向愈脈小而沉弦想是冷風中必有飛尸遁注之邪附而和之為患獺肝一錢水安息二分木香四七湯加橘紅婦人畢洞橋墟一陰一陽結謂之喉痹所痹所結仍不離乎一陰一陽之界然其所以致此實系乎陽明濕熱薰蒸於上是以久而久之地道漸形其閉飲食難以下咽甚至邪傳奇經帶下赤白氣怯神倦脈軟頭暈且眩不克支持也防脫大熟地西黨參淡天冬牛膝紫石英川貝當歸身鹿角霜龜版膠竹瀝生甘草椿根皮又進前方一劑飲食之下咽者稍易夜來得寐晨起暢吐濁痰想是衝脈隸於陽明陽明之濕熱漸化衝脈之逆氣亦能稍和然須日有起色庶免喘脫照前方曹太湖上經期落後帶下綿綿牙齦腫腐心悸且嘈兩耳時鳴口中乾燥血虛生熱濕鬱為熱二者皆傷八脈也當從八脈立方椿皮丸四物湯去芎加鹿角霜龜版膠茯神紫石英沙參王太倉産後感冒風邪膚熱形瘦口乾腰痛褥勞根也四物湯加豬腰子蔥白合瀉白散加二母紫蘇朱武進血崩後寒熱咳嗽久而不已腋下結核足跗浮腫脈細弦數陰虧血弱之體外感風邪無力以消化往往遷延日久變作虛損勿以吐血不多而忽之地骨皮飲去芎加青蒿鱉甲川貝知母枇杷露陸南潯少腹之瘕聚及脘中脹痛經年不愈皮膚甲錯大便反溏脈形細澀飲食不思難以支持也防脫四物湯用生地制蠶童便龔湘城婦人首重調經經調則百病不生此間之月事或趨前或落後責在氣不調也所以當來之日逆氣裡急即在平時帶下腰痠頭暈心悸少寐耳鳴諸虛不足之象竟難脫體非補不可非調亦不可四烏湯去芎加香附紫石英杜仲龜版蓮鬚甘菊茯神周平湖女子以肝為先天先天不足月事不來兩目乾澀左關脈息弦而且數且浮肝經氣火少降多升也生地歸身白芍桑葉芝麻牛膝甘菊川貝丹皮香附女貞石決明郁江陰寒熱兩月有餘而愈然熱尚獨留而不能退清者久矣加之以腹大重之以癥結攻痛夜劇月事不來飲食遞減大便或溏或結脈象弦而帶澀帶下綿綿肌肉瘦削口舌乾苦寒凝血滯八脈皆虛棘手之候也奈何紫石英一錢龜版一錢鹿角霜三錢當歸一錢白薇三錢白馬尿三酒杯香附一錢制蠶三錢童便一酒杯又癥結漸消攻痛自除腹之大者亦從此漸和大快事也然口舌之干苦仍然身體之留熱加劇帶下雖少月事未來飲食遞減大便帶黑脈形弦細八脈交虛餘邪未盡形神俱奪者如此容易反復慎之慎之當歸白芍川芎大生地骨皮丹皮鹿角霜龜版白薇紫石英香附制蠶童便陳楓橋月事不來者胞脈閉也任主胞胎任脈為病女子得之往往帶下瘕聚此間帶下赤色瘕聚攻痛如是者久矣已屬重候加之以內熱口乾咳嗽音爍痰曾帶血少納肉削右脈澀左關弦數自下而損及於上何從下藥乎況因病而用藥物因藥物而反增其病變作真寒假熱之體自古以來本無治法作法治之難又難矣椿根皮丸鹿角霜紫石英歸身北沙參龜版麥冬川貝茯苓陳皮西黃煙灰陸江陰經盡之年月事尚來而無血色是土敗也血枯也氣虛不能收攝也無怪乎久而不止面浮跗腫嗌乾心悸飲食無味脈息少神接踵而來以昭不克支持之兆烏賊魚骨三錢茜草炭八珍湯去芎加鹿角霜紫石英龜版俞徽州婦人首重調經然經有氣血之別又有虛實之分此間經水前後不調加之未來之前脘腹肢節無不作疼通則即已是氣滯也所見之紅色尚正而不如往日之多是血弱也氣滯為實血弱為虛二者皆不調和焉能再孕然則欲再孕之勢必既和其氣更補其血以使營衛二十五度各得其常庶乎近理至於脘脅時疼寤寐違和口乾內熱心悸腰楚亦營衛不調中之見證兼理而已權以逍遙散一補其血虛一和其氣滯者並駕齊驅小試之丸方八珍合烏骨雞丸青囊丸加杜仲丹皮阿膠逍遙散用茯神制香附棗仁遠志木香丹皮周烏鎮脾主濕濕生痰痰生熱三者之邪層出不窮無一而非脾病氣一病則飲食或多或少咳嗽時盛時衰自汗或輕或重舌上之苔黃白相兼口中之味干苦不和四肢易腫指節不舒經前腹痛如是者久矣將來緩以調之權以湯法麥冬北沙參川貝甘草蛤殼浮石淮麥香附紫貝齒茯神白薇苡仁枇杷露丸方大生地四兩歸身二兩白芍二兩香附二兩麥冬二兩白螺螄殼三兩白薇二兩冬朮二兩阿膠二兩牡蠣三兩淡芩一兩蔞皮一兩茯苓四兩川貝三兩蛤殼三兩紫貝齒三兩苡仁三兩橘紅二兩上為細末淡蜜水為丸某月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也內經已言經閉者上氣迫肺而作乾咳之形無怪乎病經五月加以營虛則發熱衛虛則惡寒欲成一損損於肺二損損於心之見證擬復脈湯與加味瀉白散炙甘草湯去薑麻仁合瀉白淡芩棗仁瘀血朱王場河頭多氣多血莫甚於陽明胃府每以下行為順滋乃逆而上行血之盈盆盈盞皆被氣之上升多且久矣久則難免鬱而為熱喉痹失音於上當臍作痛於中痹則恐其妨食痛則更慮其喘厥脈形細澀而數中沉兩按皆屬有力因病致虛理之棘手蘆根絲瓜絡苡仁牛膝冬瓜子雪羹湯荸薺海蜇陳蕭家巷瘧後中脘痞堅得食則脹加以咳嗽鼻衄苔白舌紅血中壅熱氣分多痰非勞即臌之根速為醫治雪羹合瀉白散加杏仁茯苓茅花枇杷葉朱王場河頭氣者血之帥也氣行則血亦行氣滯則血亦痹陽明之氣失其下行陽明之血亦從此內痹痹之既久又郁為熱雖從咳嗽痰血分消不足以泄其勢瘀塞於回腸曲折之處當臍作痛捫之覺熱二便不利左足之經筋有時抽痛脈來澀數按之有力腸間有壅塞成癰之象將金匱法參入前方制軍丹皮冬瓜子桃仁絲瓜子苡仁玄明粉敗醬草周震澤前方進後汗出如雨大便同和飲食不脹陽已漸升胃亦得益所患之邪自下而達之於上自內而出之於外大快事也然下利尚未全和口舌乾燥氣虛液耗之時尚須前法加減黨參冬朮茯苓炙草黃耆川連半夏澤瀉白芍吳西津橋少腹堅硬如石隱隱作疼小便不利如癃又見不約遺溺瘀血阻氣使然理之棘手抵當丸二兩研為細末取蔥汁白蜜調敷患處又昨法之下當臍之痛稍和日間小便不利夜臥又見遺尿少腹自覺氣墜當溺必作淋疼究其所以然者寒熱後濕熱夾瘀復又阻氣鬱於其間理之殊屬棘手逍遙散加韭子三錢抵當丸二兩又逍遙者消散其氣滯搖動其血鬱也既消既搖之下少腹之上部已軟溺之淋痛可輕滯欲散而鬱欲開也但毛際之間尚屬有形按之堅硬作疼溺時仍然滴瀝交睫又覺自遺脈弦數小氣墜未升經言淫氣遺溺痹聚在腎痹聚者濕氣聚而為痹也古人治此必以辛潤為主蓋辛能散濕潤能就下故也韭子歸身赤芍桑螵蛸木通滑石白魚十四個雞內金種子江興化右尺相火之脈宜大而不宜小小則相火必衰焉能有子年未四十當從再索得男立法然肝火偏旺動則心君之火不能下交於腎腎精尤易疏泄所以左關一部弦得太過也兩者不和調之本非易易權以蕩滌法然後緩以調之香砂六君用香附加白芍菟絲子丸方五味子一斤大熟地八兩西黨參八兩甘杞子四兩菟絲子三兩覆盆子四兩生於術二兩製半夏二兩新會皮二兩真坎氣十條雲茯苓三兩炙甘草一兩綿黃耆四兩煉蜜為丸每服三錢淡鹽湯下夜服一錢五分服此丸方切戒豬肉方能有子某興化陽道不舉舉則即泄可以丸藥圖之大熟地八兩黨參八兩首烏六兩龍骨二兩訶子肉五分硃砂五錢五味子八錢杞子二兩牡蠣四兩金櫻子三兩去毛菟絲子三兩覆盆子一錢煉蜜為丸再用硃砂為衣彭溧陽丸方大訶子皮五個白龍骨八兩硃砂二錢五分砂仁五錢上方即祕元丹亦名祕真丸上為細末取糯米煮爛糊丸如緑豆大用硃砂二錢五分泛上為衣空心淡鹽湯中滴入煮酒少許送下兩丸
